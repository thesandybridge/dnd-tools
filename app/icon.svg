<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- D20 outer pentagon -->
  <polygon
    points="16,3 28.3,12.1 23.6,26.5 8.4,26.5 3.7,12.1"
    fill="#1e1040"
    stroke="url(#edge)"
    stroke-width="1.2"
    stroke-linejoin="round"
  />

  <!-- Top triangle face (lit) -->
  <polygon
    points="16,3 28.3,12.1 3.7,12.1"
    fill="#2d1a5e"
    stroke="url(#edge)"
    stroke-width="0.6"
  />

  <!-- Inner face edges -->
  <line x1="16" y1="3" x2="23.6" y2="26.5" stroke="#a855f7" stroke-width="0.6" opacity="0.5"/>
  <line x1="16" y1="3" x2="8.4" y2="26.5" stroke="#a855f7" stroke-width="0.6" opacity="0.5"/>
  <line x1="28.3" y1="12.1" x2="8.4" y2="26.5" stroke="#a855f7" stroke-width="0.6" opacity="0.5"/>
  <line x1="3.7" y1="12.1" x2="23.6" y2="26.5" stroke="#a855f7" stroke-width="0.6" opacity="0.5"/>

  <!-- Center highlight triangle -->
  <polygon
    points="16,11 20.5,18 11.5,18"
    fill="#3b1f7a"
    stroke="#c084fc"
    stroke-width="0.8"
  />

  <!-- Corner ring glow -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
</svg>
